# NemoNet Blueprint
# NemoClaw blueprint for network automation sandbox.
# Passed to `nemoclaw onboard --blueprint ./blueprint/blueprint.yaml`
#
# NOTE: MCP servers are configured in config/openclaw.json (OpenClaw layer),
# not here. The blueprint handles sandbox lifecycle, inference, and egress policy.

version: "0.1.0"
min_openshell_version: "0.1.0"
min_openclaw_version: "2026.3.0"

components:
  sandbox:
    image: ghcr.io/nvidia/openshell-community/sandboxes/openclaw:latest
    name: nemonet
    forward_ports:
      - 18789

  inference:
    profiles:
      default:
        provider_type: nvidia
        provider_name: nvidia-inference
        endpoint: https://integrate.api.nvidia.com/v1
        model: nvidia/nemotron-3-super-120b-a12b
      vllm:
        provider_type: openai
        provider_name: vllm-local
        endpoint: http://localhost:8000/v1
        model: nvidia/nemotron-3-nano-30b-a3b
        credential_env: OPENAI_API_KEY
        credential_default: dummy

  policy:
    base: ./blueprint/policies/base.yaml

# Deployment profiles
profiles:
  - default
  - vllm

# Profile-specific policy overrides
policy_overrides:
  lab:
    description: Permissive for development and testing
    policy: ./blueprint/policies/lab.yaml
  production:
    description: Strict production egress — only declared vendor endpoints
    policy: ./blueprint/policies/production.yaml
  govcloud:
    description: GovCloud + FIPS-only endpoints
    policy: ./blueprint/policies/govcloud.yaml
  demo:
    description: Launchable demo profile — pre-configured for evaluation
    policy: ./blueprint/policies/base.yaml
